<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SUBWAYWEB</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f5f9;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
    /* Grid Background */
    .bg-grid {
      background-image: radial-gradient(rgba(15, 23, 42, 0.05) 1px, transparent 0);
      background-size: 20px 20px;
    }
  </style>
</head>
<body class="bg-[#f8fafc] text-[#0f172a] font-sans overflow-hidden h-screen w-screen flex flex-col md:flex-row">

  <!-- Left Sidebar (Control Panel) -->
  <aside class="w-full md:w-96 bg-white border-b md:border-b-0 md:border-r border-slate-200 flex flex-col z-10 h-2/5 md:h-full shrink-0 shadow-sm">
    <!-- Header with Toggle Buttons -->
    <div class="p-5 border-b border-slate-100 flex flex-col gap-3">
      <div class="flex items-center gap-2">
        <i class="fa-solid fa-train-subway text-indigo-600 text-2xl"></i>
        <h1 class="text-xl font-black tracking-tight text-slate-900">SUBWAYWEB</h1>
      </div>
      <!-- Region Selector -->
      <div class="flex p-1 bg-slate-100 rounded-lg">
        <button id="btn-seoul" onclick="window.switchRegion('seoul')" class="flex-1 py-1.5 text-xs font-bold rounded-md transition-all shadow-sm bg-white text-slate-900">
          서울 지하철
        </button>
        <button id="btn-busan" onclick="window.switchRegion('busan')" class="flex-1 py-1.5 text-xs font-bold rounded-md transition-all text-slate-500 hover:text-slate-900">
          부산 지하철
        </button>
      </div>
    </div>

    <!-- Search & Pathfinding Tab -->
    <div class="p-5 flex-1 overflow-y-auto space-y-4">
      
      <!-- Station Fast Search -->
      <div class="space-y-2">
        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider">역 신속 검색</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
            <i class="fa-solid fa-magnifying-glass"></i>
          </span>
          <input type="text" id="search-input" placeholder="역 이름을 입력하세요" 
            class="w-full pl-9 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500">
          
          <!-- Auto-suggest Dropdown -->
          <div id="search-suggest" class="absolute left-0 right-0 mt-1 max-h-48 overflow-y-auto bg-white border border-slate-200 rounded-lg shadow-xl hidden z-50">
            <!-- Dynamic items -->
          </div>
        </div>
      </div>

      <!-- Route Planner Form -->
      <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 space-y-3">
        <div class="flex items-center justify-between border-b border-slate-200 pb-2">
          <h3 class="text-sm font-bold text-indigo-600 flex items-center gap-1.5">
            <i class="fa-solid fa-route"></i> 최단 경로 탐색
          </h3>
          <button id="btn-reset-route" class="text-xs text-rose-500 hover:underline flex items-center gap-1">
            <i class="fa-solid fa-rotate-left"></i> 초기화
          </button>
        </div>

        <div class="grid grid-cols-1 gap-2">
          <!-- Start Station -->
          <div>
            <span class="text-xs font-semibold text-slate-500">출발역</span>
            <input type="text" id="start-station-input" readonly placeholder="신속 검색창에서 역을 선택하세요" 
              class="w-full mt-1 px-3 py-2 bg-white border border-slate-200 rounded-md text-sm text-slate-800 focus:outline-none">
          </div>

          <!-- Flip Button -->
          <div class="flex justify-center -my-1">
            <button id="btn-swap-stations" class="p-1.5 rounded bg-white border border-slate-200 text-slate-500 hover:text-slate-800 hover:border-slate-300 transition shadow-sm">
              <i class="fa-solid fa-up-down text-xs"></i>
            </button>
          </div>

          <!-- End Station -->
          <div>
            <span class="text-xs font-semibold text-slate-500">도착역</span>
            <input type="text" id="end-station-input" readonly placeholder="신속 검색창에서 역을 선택하세요" 
              class="w-full mt-1 px-3 py-2 bg-white border border-slate-200 rounded-md text-sm text-slate-800 focus:outline-none">
          </div>
        </div>

        <button id="btn-find-route" class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-lg transition text-sm flex items-center justify-center gap-2 shadow-sm">
          <i class="fa-solid fa-compass"></i> 경로 탐색 시작
        </button>
      </div>

      <!-- Search Result / Details Panel -->
      <div id="route-result" class="hidden bg-slate-50 p-4 rounded-xl border border-slate-100 space-y-3">
        <h4 class="text-xs font-bold text-slate-500 uppercase tracking-wider">탐색 결과</h4>
        
        <div class="grid grid-cols-3 gap-2 bg-white p-3 rounded-lg border border-slate-100 text-center shadow-sm">
          <div>
            <span class="text-[10px] text-slate-400 block font-semibold">소요 시간</span>
            <div class="text-base font-black text-indigo-600" id="route-time">--분</div>
          </div>
          <div class="border-x border-slate-100">
            <span class="text-[10px] text-slate-400 block font-semibold">정거장 수</span>
            <div class="text-base font-black text-slate-700" id="route-stops">--개 역</div>
          </div>
          <div>
            <span class="text-[10px] text-slate-400 block font-semibold">환승 횟수</span>
            <div class="text-base font-black text-rose-500" id="route-transfers">--회</div>
          </div>
        </div>

        <!-- Detail path list -->
        <div class="space-y-1">
          <span class="text-xs text-slate-500 font-bold">상세 경로</span>
          <div id="route-path-list" class="max-h-48 overflow-y-auto border border-slate-200 rounded-lg p-2.5 space-y-2 bg-white text-xs">
            <!-- Dynamic route list -->
          </div>
        </div>
      </div>

      <!-- Quick Legend Box -->
      <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 space-y-2">
        <span class="text-xs font-bold text-slate-500 block">노선 분류</span>
        <div class="grid grid-cols-2 gap-1.5 text-xs max-h-36 overflow-y-auto pr-1" id="legend-container">
          <!-- Dynamic legend -->
        </div>
      </div>

    </div>

    <!-- Info / Footer -->
    <div class="p-4 bg-slate-50 border-t border-slate-200 text-xs text-slate-400 flex flex-col gap-1 select-none">
      <p><i class="fa-solid fa-magnifying-glass"></i> 신속 검색을 통해 가고자 하는 역명을 쉽게 입력해 보세요.</p>
      <p><i class="fa-solid fa-hand"></i> 우측 지도 이미지는 마우스 휠 및 드래그로 자유로운 축척 제어가 가능합니다.</p>
    </div>
  </aside>

  <!-- Right Main Area: Interactive Image Canvas (SVG / PNG Viewer) -->
  <main class="flex-1 relative bg-[#f1f5f9] bg-grid overflow-hidden h-3/5 md:h-full select-none">
    
    <!-- Viewport Zoom Controls -->
    <div class="absolute bottom-6 right-6 z-10 flex flex-col gap-2 shadow-md rounded-full">
      <button id="zoom-in" class="w-11 h-11 rounded-full bg-white border border-slate-200 text-slate-700 hover:bg-slate-50 flex items-center justify-center shadow transition-all active:scale-95">
        <i class="fa-solid fa-plus text-base"></i>
      </button>
      <button id="zoom-out" class="w-11 h-11 rounded-full bg-white border border-slate-200 text-slate-700 hover:bg-slate-50 flex items-center justify-center shadow transition-all active:scale-95">
        <i class="fa-solid fa-minus text-base"></i>
      </button>
      <button id="zoom-reset" class="w-11 h-11 rounded-full bg-white border border-slate-200 text-slate-700 hover:bg-slate-50 flex items-center justify-center shadow transition-all active:scale-95">
        <i class="fa-solid fa-compress text-base"></i>
      </button>
    </div>

    <!-- Map Canvas Panning Container (Aligned to top-left to support mathematically perfect anchor zoom) -->
    <div id="map-container" class="w-full h-full cursor-grab active:cursor-grabbing overflow-hidden relative">
      <img id="subway-img" src="" alt="지하철 노선도" class="absolute top-0 left-0 max-w-none origin-top-left transition-transform duration-75 ease-out pointer-events-none select-none">
    </div>

  </main>

  <!-- Custom Alert Overlay -->
  <div id="custom-alert" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-50 hidden">
    <div class="bg-white border border-slate-200 rounded-xl p-6 max-w-sm w-full mx-4 shadow-2xl space-y-4">
      <div class="flex items-center gap-3 text-rose-500">
        <i class="fa-solid fa-triangle-exclamation text-3xl"></i>
        <h3 class="text-lg font-bold">알림</h3>
      </div>
      <p id="alert-message" class="text-sm text-slate-600">출발역과 도착역을 정확히 지정해주십시오.</p>
      <button id="alert-close" class="w-full py-2 bg-slate-900 hover:bg-slate-800 text-white rounded-lg transition text-sm font-semibold shadow-sm">
        확인
      </button>
    </div>
  </div>

    // Parser: Dynamically populates STATIONS and CONNECTIONS based on selected Region
    function buildGraph(networkData, linesData) {
      STATIONS = {};
      CONNECTIONS = [];
      LINES = linesData;

      Object.keys(networkData).forEach(key => {
        let baseLine = key.replace(/_.*$/, "");
        networkData[key].forEach(pathStr => {
          const stops = pathStr.split("-");
          for (let i = 0; i < stops.length; i++) {
            const sName = stops[i];
            
            if (!STATIONS[sName]) {
              STATIONS[sName] = { name: sName, lines: [] };
            }
            // Prevent duplicates in lines array
            if (!STATIONS[sName].lines.includes(baseLine)) {
              STATIONS[sName].lines.push(baseLine);
            }
            
            // Bidirectional edge creation for routing
            if (i < stops.length - 1) {
              CONNECTIONS.push({
                from: sName,
                to: stops[i+1],
                line: baseLine
              });
            }
          }
        });
      });
    }

    // Initialize Graph with default Seoul Data
    buildGraph(SEOUL_NETWORK, SEOUL_LINES);

    window.switchRegion = function(region) {
      if (CURRENT_REGION === region) return;

      const btnBusan = document.getElementById('btn-busan');
      
      if(region === 'seoul') {
        buildGraph(SEOUL_NETWORK, SEOUL_LINES);
        btnSeoul.className = "flex-1 py-1.5 text-xs font-bold rounded-md transition-all shadow-sm bg-white text-slate-900";
        btnBusan.className = "flex-1 py-1.5 text-xs font-bold rounded-md transition-all text-slate-500 hover:text-slate-900";
      } else {
        buildGraph(BUSAN_NETWORK, BUSAN_LINES);
        btnBusan.className = "flex-1 py-1.5 text-xs font-bold rounded-md transition-all shadow-sm bg-white text-slate-900";
        btnSeoul.className = "flex-1 py-1.5 text-xs font-bold rounded-md transition-all text-slate-500 hover:text-slate-900";
      }

      // Reset routing inputs and results safely
      try {
        clearStartStation();
        clearEndStation();
        document.getElementById("route-result").classList.add("hidden");
        document.getElementById("search-input").value = "";
      } catch(e) {}

      // Rebuild components & load image
      loadMapImage();
      renderLegend();

    // DEFENSIVE STRIPING HELPER TO AVOID "역역" DUPLICATIONS
    function formatStationName(rawName) {
      if (!rawName) return "";
      let clean = rawName.trim();
      
      // If name has bracket details like "신촌(2호선)", normalize correctly to "신촌역(2호선)"
      return clean.replace(/^(.*?)(역)?(\s*\(.*?\))?$/, function(match, base, yeok, paren) {
        return base + "역" + (paren || "");
      });
    }

    function getSearchableName(rawName) {

      return rawName.trim().replace(/역/g, "").toLowerCase();

    // --- STREAMING_CHUNK: Implementing the anchor zoom and pan logic... ---

    let touchStartDist = 0;
    let imgXAtPinch = 0;
    let imgYAtPinch = 0;

    const mapImg = document.getElementById('subway-img');

    function updateTransform() {
      mapImg.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
    }

    // Calculate initial scale to center and fit the loaded map image perfectly
    function centerImage() {
      const containerWidth = mapContainer.clientWidth;
      const containerHeight = mapContainer.clientHeight;
      const imgWidth = mapImg.naturalWidth || mapImg.offsetWidth || 1500;
      const imgHeight = mapImg.naturalHeight || mapImg.offsetHeight || 1500;

      // Determine initial scale to fit gracefully (approx 85% of viewport width)
      scale = (containerWidth / imgWidth) * 0.85;
      scale = Math.max(0.15, Math.min(scale, 8.0));

      panX = (containerWidth - imgWidth * scale) / 2;
      panY = (containerHeight - imgHeight * scale) / 2;
      updateTransform();
    }

    function loadMapImage() {
      mapImg.src = MAP_IMAGES[CURRENT_REGION];
      if (mapImg.complete) {
        centerImage();
      }
    }

      if (!isDragging) return;
      panX = e.clientX - startX;
      panY = e.clientY - startY;
      updateTransform();
    });

      isDragging = false;
      mapContainer.style.cursor = 'grab';
    });

      e.preventDefault();
      const zoomFactor = 1.15;
      const rect = mapContainer.getBoundingClientRect();
      const mouseX = e.clientX - rect.left;
      const mouseY = e.clientY - rect.top;

      // Map coordinate under cursor before scaling
      const imgX = (mouseX - panX) / scale;
      const imgY = (mouseY - panY) / scale;

      let newScale = scale;
      if (e.deltaY < 0) {
        newScale = Math.min(scale * zoomFactor, 8.0);
      } else {
        newScale = Math.max(scale / zoomFactor, 0.15);
      }

      // Readjust translations so the same image coordinate remains exactly under cursor
      panX = mouseX - imgX * newScale;
      panY = mouseY - imgY * newScale;
      scale = newScale;

    mapContainer.addEventListener('touchstart', (e) => {
      if (e.touches.length === 1) {
        isDragging = true;
        startX = e.touches[0].clientX - panX;
        startY = e.touches[0].clientY - panY;

      isDragging = false;
    });

    // Control buttons events (Zooms relative to viewport center)
    document.getElementById("zoom-in").addEventListener("click", () => {
      const rect = mapContainer.getBoundingClientRect();
      const midX = rect.width / 2;
      const midY = rect.height / 2;
      const imgX = (midX - panX) / scale;
      const imgY = (midY - panY) / scale;
      
      scale = Math.min(scale * 1.3, 8.0);
      panX = midX - imgX * scale;
      panY = midY - imgY * scale;
      updateTransform();
    });

    document.getElementById("zoom-out").addEventListener("click", () => {
      const rect = mapContainer.getBoundingClientRect();
      const midX = rect.width / 2;
      const midY = rect.height / 2;
      const imgX = (midX - panX) / scale;
      const imgY = (midY - panY) / scale;

      scale = Math.max(scale / 1.3, 0.15);
      panX = midX - imgX * scale;
      panY = midY - imgY * scale;
      updateTransform();
    });

    document.getElementById("zoom-reset").addEventListener("click", () => {
      centerImage();
    });

    // --- DIJKSTRA PATHFINDING CALCULATIONS ENGINE ---
    function buildAdjacencyList() {
      const graph = {};
      Object.keys(STATIONS).forEach(key => {
        graph[key] = [];
      });
      CONNECTIONS.forEach(conn => {
        graph[conn.from].push({ to: conn.to, weight: 2.5, line: conn.line });
        graph[conn.to].push({ to: conn.from, weight: 2.5, line: conn.line });
      });
      return graph;
    }

    function findShortestPath(startKey, endKey) {
      const graph = buildAdjacencyList();
      const distances = {};
      const previous = {};
      const previousLine = {};
      const pq = [];

      Object.keys(STATIONS).forEach(node => {
        distances[node] = Infinity;
        previous[node] = null;
        previousLine[node] = null;
      });

      distances[startKey] = 0;
      pq.push({ node: startKey, dist: 0 });

      while (pq.length > 0) {
        pq.sort((a, b) => a.dist - b.dist);
        const { node: currNode, dist: currDist } = pq.shift();

        if (currDist > distances[currNode]) continue;
        if (currNode === endKey) break;

        const neighbors = graph[currNode] || [];
        for (const edge of neighbors) {
          let edgeWeight = edge.weight;

          // Introduce transfer overhead dynamically (5 mins penalty)
          const incomingLine = previousLine[currNode];
          if (incomingLine && incomingLine !== edge.line) {
            edgeWeight += 5.0;
          }

          const alt = distances[currNode] + edgeWeight;
          if (alt < distances[edge.to]) {
            distances[edge.to] = alt;
            previous[edge.to] = currNode;
            previousLine[edge.to] = edge.line;
            pq.push({ node: edge.to, dist: alt });
          }
        }
      }

      const path = [];
      let current = endKey;
      while (current !== null) {
        path.unshift(current);
        current = previous[current];
      }

      if (distances[endKey] === Infinity) return null;

      const edgesUsed = [];
      for (let i = 0; i < path.length - 1; i++) {
        const from = path[i];
        const to = path[i+1];
        const edgeDetails = CONNECTIONS.find(c => 
          (c.from === from && c.to === to) || (c.from === to && c.to === from)
        );
        edgesUsed.push({
          from,
          to,
          line: edgeDetails ? edgeDetails.line : null
        });
      }

      return {
        path,
        edges: edgesUsed,
        distance: distances[endKey],
        stopsCount: path.length - 1
      };
    }

    // --- UX INTERACTION & AUTOCOMPLETE SEARCH LOGIC ---
    let startStationKey = null;
    let endStationKey = null;

    function showAlert(msg) {
      document.getElementById("alert-message").innerText = msg;
      document.getElementById("custom-alert").classList.remove("hidden");
    }
    document.getElementById("alert-close").addEventListener("click", () => {
      document.getElementById("custom-alert").classList.add("hidden");
    });

    function setStartStation(key) {
      startStationKey = key;
      document.getElementById("start-station-input").value = formatStationName(STATIONS[key].name);
    }

    function setEndStation(key) {
      endStationKey = key;
      document.getElementById("end-station-input").value = formatStationName(STATIONS[key].name);
    }

    function clearStartStation() {
      startStationKey = null;
      document.getElementById("start-station-input").value = "";
    }

    function clearEndStation() {
      endStationKey = null;
      document.getElementById("end-station-input").value = "";
    }

    // Dynamic Legend Renderer
    function renderLegend() {
      const container = document.getElementById("legend-container");
      container.innerHTML = "";
      Object.entries(LINES).forEach(([key, value]) => {
        const item = document.createElement("div");
        item.className = "flex items-center gap-1.5 p-1 bg-white border border-slate-100 rounded-md shadow-sm";
        item.innerHTML = `
          <span class="w-2.5 h-2.5 rounded-full shrink-0" style="background-color: ${value.color}"></span>
          <span class="truncate text-[11px] text-slate-700 font-medium">${value.name}</span>
        `;
        container.appendChild(item);
      });
    }

    // Search Box Dropdown & Dynamic Auto-suggest Event
    const searchInput = document.getElementById("search-input");
    const searchSuggest = document.getElementById("search-suggest");

    searchInput.addEventListener("input", (e) => {
      const query = getSearchableName(e.target.value);
      if (!query) {
        searchSuggest.classList.add("hidden");
        return;
      }

      const filtered = Object.entries(STATIONS).filter(([key, value]) => {
        return getSearchableName(value.name).includes(query);
      }).slice(0, 8);

      if (filtered.length === 0) {
        searchSuggest.innerHTML = `<div class="p-3 text-xs text-slate-400">검색 결과가 없습니다.</div>`;
      } else {
        searchSuggest.innerHTML = "";
        filtered.forEach(([key, value]) => {
          const item = document.createElement("div");
          item.className = "p-3 text-xs hover:bg-slate-50 cursor-pointer transition flex justify-between items-center border-b border-slate-100 last:border-0";
          
          let lineBadges = "";
          value.lines.forEach(lineKey => {
            const lineMeta = LINES[lineKey];
            if (lineMeta) {
              lineBadges += `<span class="inline-block px-1.5 py-0.5 rounded text-[9px] text-white font-bold mr-1 shrink-0" style="background-color: ${lineMeta.color}">${lineMeta.name}</span>`;
            }
          });

          item.innerHTML = `
            <span class="font-bold text-slate-700">${formatStationName(value.name)}</span>
            <div class="flex items-center overflow-x-auto max-w-[120px]">${lineBadges}</div>
          `;

          item.addEventListener("click", () => {
            searchInput.value = "";
            searchSuggest.classList.add("hidden");
            
            // Set Start first. If start exists, set End.
            if (!startStationKey) {
              setStartStation(key);
            } else if (!endStationKey) {
              if (key === startStationKey) {
                showAlert("출발역과 도착역은 같을 수 없습니다.");
                return;
              }
              setEndStation(key);
            } else {
              setStartStation(key);
              clearEndStation();
            }
          });
          searchSuggest.appendChild(item);
        });
      }
      searchSuggest.classList.remove("hidden");
    });

    document.addEventListener("click", (e) => {
      if (!searchInput.contains(e.target) && !searchSuggest.contains(e.target)) {
        searchSuggest.classList.add("hidden");
      }
    });

    // Swap Source & Destination Event Listener
    document.getElementById("btn-swap-stations").addEventListener("click", () => {
      const sTemp = startStationKey;
      const eTemp = endStationKey;
      clearStartStation();
      clearEndStation();
      if (eTemp) setStartStation(eTemp);
      if (sTemp) setEndStation(sTemp);
    });

    // Reset Route Planner
    document.getElementById("btn-reset-route").addEventListener("click", () => {
      clearStartStation();
      clearEndStation();
      document.getElementById("route-result").classList.add("hidden");
    });

    // Route Calculation Trigger
    document.getElementById("btn-find-route").addEventListener("click", () => {
      if (!startStationKey || !endStationKey) {
        showAlert("출발역과 도착역을 지정하셔야 경로 탐색이 가능합니다.");
        return;
      }

      const routeResult = findShortestPath(startStationKey, endStationKey);
      if (!routeResult) {
        showAlert("경로를 탐색할 수 없습니다.");
        return;
      }

      renderRoutingResults(routeResult);
    });

    function renderRoutingResults(route) {
      let transfers = 0;
      let prevLine = null;
      let realTimeEstimate = 0;

      route.edges.forEach((edge, i) => {
        if (i > 0 && edge.line !== prevLine) {
          transfers++;
          realTimeEstimate += 4.5; // Adding transfer walk penalty
        }
        realTimeEstimate += 2.5; // Average station-to-station gap
        prevLine = edge.line;
      });

      // Update Panel metrics
      document.getElementById("route-time").innerText = `${Math.ceil(realTimeEstimate)}분`;
      document.getElementById("route-stops").innerText = `${route.stopsCount}개 역`;
      document.getElementById("route-transfers").innerText = `${transfers}회`;

      // Fill Detailed Steps
      const pathList = document.getElementById("route-path-list");
      pathList.innerHTML = "";

      route.path.forEach((stationKey, index) => {
        const station = STATIONS[stationKey];
        const step = document.createElement("div");
        step.className = "flex items-center justify-between py-1.5 border-b border-slate-100 last:border-0";

        let currentStatusBadge = "";
        if (index < route.path.length - 1) {
          const edge = route.edges[index];
          const lineMeta = LINES[edge.line];
          currentStatusBadge = `<span class="px-1.5 py-0.5 rounded text-[9px] text-white font-bold" style="background-color: ${lineMeta?.color}">${lineMeta?.name} 승차</span>`;
        } else {
          currentStatusBadge = `<span class="px-1.5 py-0.5 rounded text-[9px] bg-emerald-100 text-emerald-800 font-bold">도착</span>`;
        }

        step.innerHTML = `
          <div class="flex items-center gap-2">
            <span class="w-2 h-2 rounded-full ${index === 0 ? 'bg-indigo-600' : (index === route.path.length-1 ? 'bg-rose-500' : 'bg-slate-300')}"></span>
            <span class="font-bold text-slate-700">${formatStationName(station.name)}</span>
          </div>
          <div>${currentStatusBadge}</div>
        `;
        pathList.appendChild(step);
      });

      document.getElementById("route-result").classList.remove("hidden");
    }

    // On Load Initial Setup
    window.onload = function() {
      loadMapImage();
      renderLegend();
    };
  </script>
</body>
