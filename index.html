<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>subwayweb Ver.2</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome for Icons -->

  <style>
    /* Custom Scrollbar for Light Theme */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f5f9;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
    /* Grid Pattern Background for Canvas Viewport */
    .bg-grid {
      background-image: radial-gradient(rgba(148, 163, 184, 0.12) 1.5px, transparent 0);
      background-size: 24px 24px;
    }
    /* Smooth transitions */
    .smooth-transition {
      transition: all 0.2s ease-in-out;
    }
    /* Image container limits */
    #map-image {
      max-width: none;
      user-select: none;
      -webkit-user-drag: none;
    }
  </style>
</head>
<body class="bg-[#f8fafc] text-[#1e293b] font-sans overflow-hidden h-screen w-screen flex flex-col md:flex-row">

  <!-- Left Sidebar (Control Panel) -->

      <div class="flex items-center gap-2">
        <i class="fa-solid fa-train-subway text-blue-600 text-2xl"></i>
        <h1 class="text-base font-extrabold tracking-tight text-slate-800">수도권 지하철 노선도</h1>
      </div>
      <span class="text-xs bg-blue-50 text-blue-600 px-2.5 py-1 rounded-full font-bold">고화질 뷰어</span>
    </div>

    <!-- Scrollable Control Panel Area -->
    <div class="p-4 flex-1 overflow-y-auto space-y-4">
      
      <!-- Route Planner Form -->

        <div class="flex items-center justify-between border-b border-slate-200/50 pb-2">
          <h3 class="text-sm font-bold text-slate-800 flex items-center gap-2">
            <i class="fa-solid fa-route text-blue-600"></i> 실시간 최단 경로 검색

          <button id="btn-reset-route" class="text-xs text-rose-500 hover:text-rose-700 font-bold flex items-center gap-1 transition-all">
            <i class="fa-solid fa-rotate-left"></i> 초기화
          </button>
        </div>

        <div class="grid grid-cols-1 gap-2 relative">
          <!-- Start Station Field -->
          <div class="relative">
            <span class="text-[11px] font-bold text-slate-400 block mb-1">출발역</span>
            <div class="relative">
              <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                <i class="fa-solid fa-circle-play text-emerald-500"></i>
              </span>
              <input type="text" id="start-input" placeholder="출발역 이름을 입력하세요" 
                class="w-full pl-9 pr-4 py-2 bg-white border border-slate-200 rounded-xl text-sm font-semibold text-slate-700 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all shadow-sm">
            </div>
            <!-- Start Suggest Dropdown -->
            <div id="start-suggest" class="absolute left-0 right-0 mt-1 max-h-40 overflow-y-auto bg-white border border-slate-200 rounded-xl shadow-xl hidden z-50"></div>
          </div>

          <!-- Swap Button -->
          <div class="flex justify-center my-0.5">
            <button id="btn-swap-stations" class="p-1.5 rounded-full bg-white border border-slate-200 text-slate-500 hover:text-slate-800 hover:shadow-md transition-all">
              <i class="fa-solid fa-up-down text-xs"></i>
            </button>
          </div>

          <!-- End Station Field -->
          <div class="relative">
            <span class="text-[11px] font-bold text-slate-400 block mb-1">도착역</span>
            <div class="relative">
              <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                <i class="fa-solid fa-circle-stop text-rose-500"></i>
              </span>
              <input type="text" id="end-input" placeholder="도착역 이름을 입력하세요" 
                class="w-full pl-9 pr-4 py-2 bg-white border border-slate-200 rounded-xl text-sm font-semibold text-slate-700 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all shadow-sm">
            </div>
            <!-- End Suggest Dropdown -->
            <div id="end-suggest" class="absolute left-0 right-0 mt-1 max-h-40 overflow-y-auto bg-white border border-slate-200 rounded-xl shadow-xl hidden z-50"></div>
          </div>
        </div>

        <button id="btn-find-route" class="w-full py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition-all text-sm flex items-center justify-center gap-2 shadow-md">
          <i class="fa-solid fa-compass"></i> 최적 경로 탐색하기
        </button>
      </div>

      <!-- Search Result Panel -->
      <div id="route-result" class="hidden bg-slate-50 p-4 rounded-2xl border border-slate-200/60 space-y-3 shadow-sm">
        <h4 class="text-xs font-bold text-slate-500 uppercase tracking-wider">탐색 결과 분석</h4>
        
        <div class="grid grid-cols-3 gap-2 bg-white border border-slate-100 p-3 rounded-xl shadow-inner text-center">

            <div class="text-base font-extrabold text-emerald-600" id="route-time">--분</div>
          </div>
          <div class="border-x border-slate-100">
            <span class="text-[10px] font-bold text-slate-400 block">정거장 수</span>
            <div class="text-base font-extrabold text-indigo-600" id="route-stops">--개 역</div>
          </div>
          <div>
            <span class="text-[10px] font-bold text-slate-400 block">환승 횟수</span>
            <div class="text-base font-extrabold text-rose-500" id="route-transfers">--회</div>

      <span class="text-xs font-bold text-slate-700 flex items-center gap-1.5">
        <i class="fa-solid fa-image text-blue-500"></i> 고해상도 공식 노선도 뷰어

        <i class="fa-solid fa-plus text-lg"></i>

      <button id="zoom-out" class="w-10 h-10 rounded-xl bg-white/95 backdrop-blur border border-slate-200 text-slate-700 hover:bg-slate-50 flex items-center justify-center shadow-lg transition-all" title="축소">

    // Parser: Dynamically populates STATIONS and CONNECTIONS
    Object.keys(rawNetwork).forEach(key => {
      let baseLine = key.replace(/_.*$/, "");
      rawNetwork[key].forEach(pathStr => {
        const stops = pathStr.split("-");
        for (let i = 0; i < stops.length; i++) {
          const sName = stops[i];
          
          if (!STATIONS[sName]) {
            STATIONS[sName] = { name: sName, lines: [] };
          }
          // Prevent duplicates in lines array
          if (!STATIONS[sName].lines.includes(baseLine)) {
            STATIONS[sName].lines.push(baseLine);
          }
          
          // Bidirectional edge creation for routing
          if (i < stops.length - 1) {
            CONNECTIONS.push({
              from: sName,
              to: stops[i+1],
              line: baseLine
            });
          }
        }
      });
    });

    // --- DEFENSIVE STRIIPING HELPER TO AVOID "역역" DUPLICATIONS ---
    function formatStationName(rawName) {
      if (!rawName) return "";
      let clean = rawName.trim();
      // Safe parsing for names with parenthesis like "신촌(2호선)" -> "신촌역(2호선)"
      return clean.replace(/(역)?(\(.*?\))?$/, (match, p1, p2) => "역" + (p2 || ""));
    }

    function getSearchableName(rawName) {
      if (!rawName) return "";
      return rawName.trim().replace(/역/g, "").toLowerCase();
    }

    // --- GLOBAL VIEWPORT AND APP CONFIG ---

    function updateTransform() {
      mapImage.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
    }

    function initViewerCenter() {
      const containerWidth = viewport.clientWidth;
      const containerHeight = viewport.clientHeight;
      
      scale = 0.5;
      panX = (containerWidth - 1280 * scale) / 2;
      panY = (containerHeight - 1280 * scale) / 2;
      
      updateTransform();
    }

    // --- VIEWPORT MOUSE AND TOUCH EVENTS ---
    viewport.addEventListener("wheel", (e) => {
      e.preventDefault();
      const zoomFactor = 1.1;
      
      const mouseX = e.clientX - viewport.getBoundingClientRect().left;
      const mouseY = e.clientY - viewport.getBoundingClientRect().top;

      const imgPointX = (mouseX - panX) / scale;
      const imgPointY = (mouseY - panY) / scale;

      if (e.deltaY < 0) {
        scale = Math.min(scale * zoomFactor, 3.5);
      } else {
        scale = Math.max(scale / zoomFactor, 0.15);
      }

      panX = mouseX - imgPointX * scale;
      panY = mouseY - imgPointY * scale;

      updateTransform();
    }, { passive: false });

    viewport.addEventListener("mousedown", (e) => {
      isDragging = true;
      dragStartX = e.clientX - panX;
      dragStartY = e.clientY - panY;
      mapImage.classList.remove("smooth-transition");
    });

    window.addEventListener("mousemove", (e) => {
      if (!isDragging) return;
      panX = e.clientX - dragStartX;
      panY = e.clientY - dragStartY;
      updateTransform();
    });

    window.addEventListener("mouseup", () => {
      if (isDragging) {

    // Touch Support (Pinch & Pan) for Mobile Devices
    let touchStartDist = 0;
    viewport.addEventListener("touchstart", (e) => {
      mapImage.classList.remove("smooth-transition");
      if (e.touches.length === 1) {
        isDragging = true;
        dragStartX = e.touches[0].clientX - panX;
        dragStartY = e.touches[0].clientY - panY;
      } else if (e.touches.length === 2) {
        isDragging = false;
        touchStartDist = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
      }
    });

    viewport.addEventListener("touchmove", (e) => {
      if (isDragging && e.touches.length === 1) {
        panX = e.touches[0].clientX - dragStartX;
        panY = e.touches[0].clientY - dragStartY;
        updateTransform();
      } else if (e.touches.length === 2) {
        const dist = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
        const factor = dist / touchStartDist;
        
        const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2 - viewport.getBoundingClientRect().left;
        const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2 - viewport.getBoundingClientRect().top;
        
        const imgPointX = (midX - panX) / scale;
        const imgPointY = (midY - panY) / scale;

        scale = Math.max(0.15, Math.min(scale * factor, 3.5));
        
        panX = midX - imgPointX * scale;
        panY = midY - imgPointY * scale;

        touchStartDist = dist;
        updateTransform();
      }
    });

    // --- DIJKSTRA PATHFINDING SERVICE ---
    function buildAdjacencyList() {
      const graph = {};
      Object.keys(STATIONS).forEach(key => {
        graph[key] = [];
      });

      CONNECTIONS.forEach(conn => {
        graph[conn.from].push({ to: conn.to, weight: 2.5, line: conn.line });
        graph[conn.to].push({ to: conn.from, weight: 2.5, line: conn.line });
      });

      return graph;
    }

    function calculateShortestPath(startKey, endKey) {
      const graph = buildAdjacencyList();
      const distances = {};
      const previous = {};
      const previousLine = {};
      const pq = [];

      Object.keys(STATIONS).forEach(node => {
        distances[node] = Infinity;
        previous[node] = null;
        previousLine[node] = null;
      });

      distances[startKey] = 0;
      pq.push({ node: startKey, dist: 0 });

      while (pq.length > 0) {
        pq.sort((a, b) => a.dist - b.dist);
        const { node: currNode, dist: currDist } = pq.shift();

        if (currDist > distances[currNode]) continue;
        if (currNode === endKey) break;

        const neighbors = graph[currNode] || [];
        for (const edge of neighbors) {
          let edgeWeight = edge.weight;

          const currentIncomingLine = previousLine[currNode];
          if (currentIncomingLine && currentIncomingLine !== edge.line) {
            edgeWeight += 5.0; // Transfer overhead time penalty (5 mins)
          }

          const alt = distances[currNode] + edgeWeight;
          if (alt < distances[edge.to]) {
            distances[edge.to] = alt;
            previous[edge.to] = currNode;
            previousLine[edge.to] = edge.line;
            pq.push({ node: edge.to, dist: alt });
          }
        }
      }

      const path = [];
      let current = endKey;
      while (current !== null) {
        path.unshift(current);
        current = previous[current];
      }

      if (distances[endKey] === Infinity) return null;

      const edgesUsed = [];
      for (let i = 0; i < path.length - 1; i++) {
        const from = path[i];
        const to = path[i+1];
        const edgeDetails = CONNECTIONS.find(c => 
          (c.from === from && c.to === to) || (c.from === to && c.to === from)
        );
        edgesUsed.push({
          from,
          to,
          line: edgeDetails ? edgeDetails.line : null
        });
      }

      return {
        path,
        edges: edgesUsed,
        distance: distances[endKey],
        stopsCount: path.length - 1
      };
    }

    // --- AUTOCOMPLETE & INPUT VALIDATOR SYSTEM ---
    function setupAutocomplete(inputElement, suggestElement, selectCallback) {
      inputElement.addEventListener("input", (e) => {
        const q = getSearchableName(e.target.value);
        if (!q) {
          suggestElement.classList.add("hidden");
          return;
        }

        const filtered = Object.entries(STATIONS).filter(([key, val]) => {
          const nameClean = getSearchableName(val.name);
          return nameClean.includes(q);
        }).slice(0, 7);

        if (filtered.length === 0) {
          suggestElement.innerHTML = `<div class="p-3 text-xs text-slate-400 font-semibold text-center">결과를 찾지 못했습니다.</div>`;
        } else {
          suggestElement.innerHTML = "";
          filtered.forEach(([key, val]) => {
            const item = document.createElement("div");
            item.className = "p-2.5 text-sm hover:bg-slate-50 cursor-pointer transition-all flex justify-between items-center border-b border-slate-100 last:border-0";
            
            let lineBadges = "";
            val.lines.forEach(lineKey => {
              const lMeta = LINES[lineKey];
              if (lMeta) {
                lineBadges += `<span class="inline-block px-1.5 py-0.5 rounded text-[9px] text-white font-bold mr-0.5" style="background-color: ${lMeta.color}">${lMeta.name}</span>`;
              }
            });

            // Prevent duplicate "역역" in rendering list items
            const finalNodeName = formatStationName(val.name);

            item.innerHTML = `
              <span class="font-bold text-slate-700">${finalNodeName}</span>
              <div class="flex items-center">${lineBadges}</div>
            `;

            item.addEventListener("click", () => {
              inputElement.value = finalNodeName;
              suggestElement.classList.add("hidden");
              selectCallback(key);
            });
            suggestElement.appendChild(item);
          });
        }
        suggestElement.classList.remove("hidden");
      });

      document.addEventListener("click", (e) => {
        if (!inputElement.contains(e.target) && !suggestElement.contains(e.target)) {
          suggestElement.classList.add("hidden");
        }
      });
    }

      selectedStartKey = null;
      selectedEndKey = null;
      startInput.value = "";
      endInput.value = "";
      document.getElementById("route-result").classList.add("hidden");
    });

    // Trigger Route Search
    document.getElementById("btn-find-route").addEventListener("click", () => {
      if (!selectedStartKey || !selectedEndKey) {
        showAlert("출발역과 도착역을 모두 올바르게 입력해야 경로 탐색이 가능합니다.");
        return;
      }
      if (selectedStartKey === selectedEndKey) {
        showAlert("출발역과 도착역은 같을 수 없습니다.");
        return;
      }

      const routeResult = calculateShortestPath(selectedStartKey, selectedEndKey);
      if (!routeResult) {
        showAlert("선택한 경로 사이에 유효한 철도 연결망이 존재하지 않습니다.");
        return;
      }

      // Compute statistics
      let transfers = 0;
      let prevLine = null;
      let realTimeEstimate = 0;

      routeResult.edges.forEach((edge, i) => {
        if (i > 0 && edge.line !== prevLine) {
          transfers++;
          realTimeEstimate += 4; // Transfer penalty applied
        }
        realTimeEstimate += 2.5; // Avg section traverse estimate
        prevLine = edge.line;
      });

      document.getElementById("route-time").innerText = `${Math.ceil(realTimeEstimate)}분`;
      document.getElementById("route-stops").innerText = `${routeResult.stopsCount}개 역`;
      document.getElementById("route-transfers").innerText = `${transfers}회`;

      const listContainer = document.getElementById("route-path-list");
      listContainer.innerHTML = "";

      // Append route logs beautifully
      routeResult.path.forEach((stationKey, index) => {
        const station = STATIONS[stationKey];
        const stepDiv = document.createElement("div");
        stepDiv.className = "flex items-center justify-between py-1.5 border-b border-slate-100 last:border-0";
        
        let edgeLineBadge = "";
        if (index < routeResult.path.length - 1) {
          const nextEdge = routeResult.edges[index];
          const lineMeta = LINES[nextEdge.line];
          edgeLineBadge = `<span class="px-2 py-0.5 rounded text-[9px] text-white font-bold" style="background-color: ${lineMeta?.color}">${lineMeta?.name} 승차</span>`;
        } else {
          edgeLineBadge = `<span class="px-2 py-0.5 rounded text-[9px] bg-emerald-100 text-emerald-800 font-bold">도착</span>`;
        }

        // Apply defensive formatting here to avoid duplication
        const formattedName = formatStationName(station.name);

        stepDiv.innerHTML = `
          <div class="flex items-center gap-1.5">
            <span class="w-2.5 h-2.5 rounded-full ${index === 0 ? 'bg-emerald-500' : (index === routeResult.path.length-1 ? 'bg-rose-500' : 'bg-slate-300')} shadow-sm"></span>
            <span class="font-extrabold text-slate-700">${formattedName}</span>
          </div>
          <div>${edgeLineBadge}</div>
        `;
        listContainer.appendChild(stepDiv);
      });

      document.getElementById("route-result").classList.remove("hidden");
    });

    // Render legend guides dynamically
    function renderLegends() {
      const legendContainer = document.getElementById("legend-container");
      Object.entries(LINES).forEach(([key, value]) => {
        const item = document.createElement("div");
        item.className = "flex items-center gap-2 p-2 rounded-xl bg-white border border-slate-100 shadow-sm";
        item.innerHTML = `
          <span class="w-2.5 h-2.5 rounded-full shrink-0 shadow-inner" style="background-color: ${value.color}"></span>
          <span class="truncate font-bold text-slate-600 text-[10.5px]">${value.name}</span>
        `;
        legendContainer.appendChild(item);
      });
    }

    // Window Init Event Loop trigger
    window.onload = function () {
      renderLegends();
      initViewerCenter();
      
      window.addEventListener("resize", () => {
        updateTransform();
      });
    };
  </script>
</body>
</html>
